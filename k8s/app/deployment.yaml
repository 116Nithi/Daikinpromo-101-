apiVersion: apps/v1
kind: Deployment
metadata:
  name: kongkwun-bot
  namespace: kongkwun-bot
  labels:
    app: kongkwun-bot
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kongkwun-bot
  template:
    metadata:
      labels:
        app: kongkwun-bot
    spec:
      containers:
        - name: kongkwun-bot
          image: smartcms/kongkwun-chat:v2
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: kongkwun-bot-config
            - secretRef:
                name: kongkwun-bot-secret
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
      restartPolicy: Always
