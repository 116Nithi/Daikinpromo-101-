apiVersion: v1
kind: Secret
metadata:
  name: kongkwun-bot-secret
  namespace: kongkwun-bot
type: Opaque
stringData:
  LINE_CHANNEL_SECRET: "replace-with-line-channel-secret"
  LINE_CHANNEL_ACCESS_TOKEN: "replace-with-line-channel-access-token"
  DATABASE_URL: "mysql://USER:PASSWORD@mysql-svc:3306/kongkwun_bot"
  GCS_BUCKET_NAME: "replace-with-gcs-bucket"
  # For GKE Workload Identity, leave GCS_KEY_FILE unset and remove this key.
  # For Rancher/non-GKE clusters, paste the service account JSON as a single string.
  GCS_KEY_FILE: ""
