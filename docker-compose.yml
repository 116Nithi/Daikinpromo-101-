services:
  app:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - DATABASE_URL=mysql://smmms_admin:Q6JK6uNDD8t4C6V9euyd@mysql:3306/kwunjai_bot
    volumes:
      - ./rearn-201506-c7325af234f1.json:/app/rearn-201506-c7325af234f1.json:ro
    depends_on:
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root_pass
      MYSQL_DATABASE: kwunjai_bot
      MYSQL_USER: smmms_admin
      MYSQL_PASSWORD: Q6JK6uNDD8t4C6V9euyd
    volumes:
      - mysqldata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot_pass"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  mysqldata:
  redisdata:
