services:
  app:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - DATABASE_URL=mysql://kongkwun:kongkwun_pass@mysql:3306/kongkwun_bot
      - GCS_KEY_FILE=/app/gcs-key.json
    volumes:
      - ./rearn-201506-c7325af234f1.json:/app/gcs-key.json:ro
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root_pass
      MYSQL_USER: kongkwun
      MYSQL_PASSWORD: kongkwun_pass
      MYSQL_DATABASE: kongkwun_bot
    ports:
      - "3306:3306"
    volumes:
      - mysqldata:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ukongkwun", "-pkongkwun_pass"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  mysqldata:
  redisdata:
